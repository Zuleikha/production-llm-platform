[project]
name = "production-llm-platform"
version = "0.1.0"
description = "A production-grade LLM platform — built in 10 stages. Stage 1: foundation and tooling."
readme = "README.md"
requires-python = ">=3.12,<3.13"
license = { text = "MIT" }
authors = [{ name = "production-llm-platform maintainers" }]

# Base runtime dependencies. These are the ONLY packages required to run the
# Stage 1 foundation API. Heavy future-stage libraries (LangChain, LangGraph,
# LlamaIndex, OpenTelemetry SDK, DB drivers) are declared as optional extras
# below so the base install stays small and `uv sync` stays fast and reliable.
# All versions are pinned exactly (== ) — see ADR 0001 for rationale.
dependencies = [
    "fastapi==0.139.0",
    "uvicorn[standard]==0.51.0",
    "pydantic==2.13.4",
    "pydantic-settings==2.14.2",
    "prometheus-client==0.25.0",
    # Normally transitive (via anyio -> httpx). Pinned as an explicit direct
    # dependency to work around a cross-drive uv install quirk on this machine
    # where it was silently not installed, causing an import-time crash. See
    # "Known environment quirks" in CLAUDE.md.
    "sniffio>=1.3.1",
]

[project.optional-dependencies]
# --- Future-stage libraries: DECLARED and pinned now, wired up in later stages. ---
# Stage 3 (agents) + orchestration graphs.
orchestration = [
    "langchain==1.3.13",
    "langgraph==1.2.9",
]
# Stage 4 (RAG / retrieval).
retrieval = [
    "llama-index==0.14.23",
    "qdrant-client==1.18.0",
]
# Stage 5 (observability backends: OTel export, collector).
observability = [
    "opentelemetry-api==1.43.0",
    "opentelemetry-sdk==1.43.0",
    "opentelemetry-instrumentation-fastapi==0.64b0",
]
# Datastore drivers (used from Stage 2 onward once the API talks to storage).
datastores = [
    "redis==8.0.1",
    "asyncpg==0.31.0",
]

[dependency-groups]
# Developer tooling — installed by `uv sync` by default, excluded from images.
dev = [
    "pytest==9.1.1",
    "pytest-asyncio==1.4.0",
    "httpx==0.28.1",
    "ruff==0.15.21",
    "mypy==2.3.0",
    "pre-commit==4.6.0",
]

[tool.uv]
# Application project, not a distributable library: uv should manage the venv
# and install dependencies, but not attempt to build/install this repo as a
# package. Packages are imported via the repo-root path (see pytest config).
package = false

# ---------------------------------------------------------------------------
# Ruff — linter + formatter (replaces black + isort + flake8). See ADR 0001.
# ---------------------------------------------------------------------------
[tool.ruff]
target-version = "py312"
line-length = 100
src = ["services", "shared", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort (import sorting)
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "TID", # flake8-tidy-imports
    "RUF", # ruff-specific rules
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B011"]

[tool.ruff.format]
docstring-code-format = true

# ---------------------------------------------------------------------------
# mypy — static type checking in STRICT mode. See ADR 0001.
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.12"
strict = true
warn_unreachable = true
warn_redundant_casts = true
warn_unused_ignores = true
disallow_untyped_defs = true
no_implicit_reexport = true
plugins = ["pydantic.mypy"]
files = ["services", "shared", "tests"]

[[tool.mypy.overrides]]
# Third-party libs without bundled type hints — do not fail strict mode on them.
module = ["prometheus_client.*"]
ignore_missing_imports = true

# ---------------------------------------------------------------------------
# pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
minversion = "8.0"
# Repo root on the path so `import shared` / `import services...` works without
# packaging the project (package = false above).
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-ra -q --strict-markers"
asyncio_mode = "auto"
