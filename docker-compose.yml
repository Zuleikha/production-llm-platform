# ---------------------------------------------------------------------------
# Local development stack: api + postgres + redis + qdrant + prometheus + grafana.
#
#   docker compose up -d --build
#   curl http://localhost:8000/health
#
# NOTE (Stage 1): the api does NOT yet connect to postgres/redis/qdrant. They are
# wired here so the infrastructure is ready and reproducible; the API consumes
# them from Stage 2 onward. Connection URLs are passed as env vars already to
# establish the pattern.
#
# Credentials below are LOCAL DEV PLACEHOLDERS ONLY, overridable via .env.
# Production secrets are injected by the deployment platform, never committed.
# ---------------------------------------------------------------------------

name: production-llm-platform

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: production-llm-platform/api:0.1.0
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Profile selection. OS env (here) overrides config/environments/dev.env,
      # which demonstrates the config precedence chain.
      ENVIRONMENT: dev
      LOG_FORMAT: json
      LOG_LEVEL: INFO
      API_PORT: "8000"
      # Reserved for Stage 2+ (unused by the Stage 1 app).
      DATABASE_URL: postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/${POSTGRES_DB:-platform}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks: [platform]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-platform}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [platform]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [platform]

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP / dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks: [platform]

  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api
    networks: [platform]

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      # Local dev only. Anonymous view access keeps first-run friction low.
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks: [platform]

networks:
  platform:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
