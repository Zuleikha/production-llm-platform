# ---------------------------------------------------------------------------
# Local development stack: api + postgres + redis + qdrant + prometheus +
# grafana + otel-collector + tempo.
#
#   docker compose up -d --build
#   curl http://localhost:8000/health
#
# The api connects to postgres/redis/qdrant on startup (Stage 2) and probes all
# three from /ready. Connection URLs are injected as env vars below. It exports
# traces to the collector, which forwards them to Tempo (Stage 5, ADR 0016).
#
# Ports on the host: api 8000 · postgres 5432 · redis 6379 · qdrant 6333/6334 ·
# prometheus 9090 · grafana 3001 (NOT 3000 — see CLAUDE.md) · tempo 3200 ·
# collector 4317/4318.
#
# Credentials below are LOCAL DEV PLACEHOLDERS ONLY, overridable via .env.
# Production secrets are injected by the deployment platform, never committed.
# ---------------------------------------------------------------------------
name: production-llm-platform
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: production-llm-platform/api:0.1.0
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Profile selection. OS env (here) overrides config/environments/dev.env,
      # which demonstrates the config precedence chain. MUST be overridable: Stage
      # 9's two-mode Locust harness runs the cost-free primary load against the
      # `test` profile via `ENVIRONMENT=test docker compose up` (tests/load/README.md).
      # A hardcoded `dev` silently ignored that override and booted dev regardless.
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      LOG_FORMAT: json
      LOG_LEVEL: INFO
      API_PORT: "8000"
      # Pooled at startup and probed by /ready — see ADR 0005.
      DATABASE_URL: postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/${POSTGRES_DB:-platform}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      # Passed through from the host shell — NEVER hardcoded here (this file is
      # committed). Without it the container boots and /health is fine, but every
      # chat request fails: `dev` does not require the key at boot, only `prod`
      # does (ADR 0006). Export it before `docker compose up`.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Same rules, second vendor (Stage 4, ADR 0011). Without it the container
      # boots and chat works, but `document_search` fails on every call and the
      # agent answers ungrounded. Needed by `scripts/ingest.py` too — that is
      # what actually spends the money.
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      # Stage 8 auth. Passed through from the host shell, same rule as the two
      # above — never hardcoded here. API_KEYS holds principal:hexhash pairs;
      # API_KEY_HASH_SECRET is the server-side pepper HMAC'd into each key.
      # Required under prod; dev/test boot fine without them but every request
      # 401s until they're set.
      API_KEYS: ${API_KEYS:-}
      API_KEY_HASH_SECRET: ${API_KEY_HASH_SECRET:-}
      # Where @traced sends its spans (Stage 5, ADR 0016). Unset = never dialled
      # and the service runs untraced, so this is what turns tracing on. Not a
      # secret and not a boot requirement — a missing collector must not stop the
      # API serving traffic.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      # Started, not healthy: the API must boot whether or not the collector is
      # up. Spans are dropped by the SDK's batch processor if nothing is
      # listening — tracing degrades, the service does not.
      otel-collector:
        condition: service_started
    networks: [platform]
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-platform}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [platform]
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [platform]
  qdrant:
    # Kept in lockstep with the pinned `qdrant-client` (1.18.0): the client warns
    # and may misbehave when the server's minor version is more than one away.
    # Stage 2 could pin the server freely because it spoke raw HTTP; Stage 4 uses
    # the real client, so the two versions now move together. See ADR 0012.
    image: qdrant/qdrant:v1.18.1
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP / dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks: [platform]
  # --- Tracing (Stage 5, ADR 0016) -----------------------------------------
  # api --OTLP/http:4318--> otel-collector --OTLP/grpc:4317--> tempo <-- grafana
  #
  # The collector is a hop the API could technically skip by writing to Tempo
  # directly. It earns its place as the one point where sampling, batching and
  # (later) redaction apply to every producer at once, and as the seam that lets
  # the trace backend change without touching application config. Traces only —
  # metrics stay on Prometheus scraping /metrics (ADR 0016).
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    restart: unless-stopped
    command: ["--config=/etc/otel-collector/config.yml"]
    volumes:
      - ./infrastructure/docker/otel-collector/config.yml:/etc/otel-collector/config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP — what the API speaks
    depends_on:
      - tempo
    networks: [platform]
  tempo:
    image: grafana/tempo:2.6.1
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yml"]
    user: "0:0"  # writes to the volume below; the image's default user cannot
    volumes:
      - ./infrastructure/docker/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # HTTP — Grafana's datasource and the trace-search API
    networks: [platform]
  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api
    networks: [platform]
  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      # Local dev only. Anonymous view access keeps first-run friction low.
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo
    networks: [platform]
networks:
  platform:
    driver: bridge
volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  tempo_data: