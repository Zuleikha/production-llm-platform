apiVersion: v1
kind: Secret
metadata:
  name: {{ include "production-llm-platform.fullname" . }}-secret
  labels:
    {{- include "production-llm-platform.labels" . | nindent 4 }}
type: Opaque
# Values injected at install (--set secrets.*, --set datastores.*), NEVER
# committed. Keys absent from stringData simply do not appear as env vars; under
# the `prod` profile a missing datastore URL or API key makes the app refuse to
# boot, which is the intended fail-loud behaviour (ADR 0005/0006/0011).
stringData:
  {{- $db := include "production-llm-platform.databaseUrl" . }}
  {{- if $db }}
  DATABASE_URL: {{ $db | quote }}
  {{- end }}
  {{- $redis := include "production-llm-platform.redisUrl" . }}
  {{- if $redis }}
  REDIS_URL: {{ $redis | quote }}
  {{- end }}
  {{- $qdrant := include "production-llm-platform.qdrantUrl" . }}
  {{- if $qdrant }}
  QDRANT_URL: {{ $qdrant | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.voyageApiKey }}
  VOYAGE_API_KEY: {{ .Values.secrets.voyageApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.apiKeys }}
  API_KEYS: {{ .Values.secrets.apiKeys | quote }}
  {{- end }}
  {{- if .Values.secrets.apiKeyHashSecret }}
  API_KEY_HASH_SECRET: {{ .Values.secrets.apiKeyHashSecret | quote }}
  {{- end }}
