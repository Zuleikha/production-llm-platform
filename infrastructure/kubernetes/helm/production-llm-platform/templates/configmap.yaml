apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "production-llm-platform.fullname" . }}-config
  labels:
    {{- include "production-llm-platform.labels" . | nindent 4 }}
# Non-secret application settings only. Datastore URLs and API keys live in the
# Secret (they can carry credentials) — never here.
data:
  ENVIRONMENT: {{ .Values.env.ENVIRONMENT | quote }}
  LOG_FORMAT: {{ .Values.env.LOG_FORMAT | quote }}
  LOG_LEVEL: {{ .Values.env.LOG_LEVEL | quote }}
  API_PORT: {{ .Values.containerPort | quote }}
  {{- if .Values.otel.endpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  {{- end }}
