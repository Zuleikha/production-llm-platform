# Prometheus scrape configuration for the local Compose stack.
# The api service exposes the Prometheus text format at /metrics (Stage 1).
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: production-llm-platform

# No Prometheus alerting rules by design. Stage 5 chose Grafana's built-in
# unified alerting (provisioned under grafana/provisioning/alerting/) over a
# Prometheus + Alertmanager pipeline — one fewer container family (ADR 0016).
rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: api
