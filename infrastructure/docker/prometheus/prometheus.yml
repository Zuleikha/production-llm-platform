# Prometheus scrape configuration for the local Compose stack.
# The api service exposes the Prometheus text format at /metrics (Stage 1).
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: production-llm-platform

# No Prometheus alerting rules by design. Stage 5 chose Grafana's built-in
# unified alerting (provisioned under grafana/provisioning/alerting/) over a
# Prometheus + Alertmanager pipeline — one fewer container family (ADR 0016).
rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: api

  # Span-derived metrics from the collector's spanmetrics/servicegraph connectors
  # (Stage 9, ADR 0020). An ADDITIONAL target — the api scrape above is untouched.
  # These series back Tempo's service-map / node-graph views, not the app's RED
  # metrics, which stay on the api job. See otel-collector/config.yml.
  - job_name: otel-collector-spanmetrics
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: otel-collector
