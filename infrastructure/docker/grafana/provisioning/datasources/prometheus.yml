# Grafana datasource provisioned as code — no manual UI setup needed.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # Explicit uid (Stage 5): the provisioned dashboards and the Tempo
    # datasource's tracesToMetrics link both reference this datasource by uid.
    # Left unset, Grafana generates one per install and those references break.
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: false
